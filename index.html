<script>
// \u2500\u2500 iOS: Se aberto pelo app Arquivos (quick look), redireciona para Safari \u2500\u2500
(function() {
  var ua = navigator.userAgent;
  var isIOS = /iPhone|iPad|iPod/.test(ua);
  var isFileProtocol = location.protocol === 'file:';
  
  // Detecta o quick look viewer do iOS (tem limita\u00E7\u00F5es de JS)
  // A forma mais confi\u00E1vel: verificar se localStorage est\u00E1 dispon\u00EDvel
  if (isIOS && isFileProtocol) {
    try {
      localStorage.setItem('_test', '1');
      localStorage.removeItem('_test');
      // localStorage funciona - estamos no Safari, tudo certo
    } catch(e) {
      // localStorage bloqueado = estamos no Quick Look do app Arquivos
      // Mostrar instru\u00E7\u00E3o para abrir no Safari
      document.addEventListener('DOMContentLoaded', function() {
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:#0C1A0F;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;font-family:sans-serif';
        overlay.innerHTML = '<div style="font-size:48px;margin-bottom:20px">\uD83C\uDF55</div>' +
          '<div style="color:#E8F2EA;font-size:22px;font-weight:700;margin-bottom:12px">Sesconetto\'s Estoque</div>' +
          '<div style="color:#5A7A62;font-size:15px;margin-bottom:32px;line-height:1.5">Para usar o app, abra no <strong style="color:#26743E">Safari</strong></div>' +
          '<div style="background:#1A3020;border-radius:12px;padding:20px;max-width:300px;width:100%">' +
          '<div style="color:#A8C4AE;font-size:13px;line-height:1.8;text-align:left">' +
          '1. Toque em <strong style="color:#E8F2EA">\u22EF</strong> (3 pontos) no canto superior direito<br>' +
          '2. Toque em <strong style="color:#E8F2EA">"Abrir com..."</strong><br>' +
          '3. Escolha <strong style="color:#26743E">Safari</strong>' +
          '</div></div>' +
          '<div style="color:#2A4030;font-size:11px;margin-top:24px">ou copie o arquivo para o iCloud Drive<br>e abra pelo Safari</div>';
        document.body.appendChild(overlay);
      });
    }
  }
})();
</script>
<script>
  // window.screen.width retorna pixels f\u00EDsicos no Android (devicePixelRatio > 1),
  // ent\u00E3o normalizamos para pixels l\u00F3gicos (CSS pixels) antes de decidir a escala.
  (function() {
    const dpr = window.devicePixelRatio || 1;
    const physW = window.screen.width;
    const logicalW = Math.round(physW / dpr); // largura em CSS pixels

    let scale = 1.0;

    if (logicalW <= 320) scale = 0.78;      // iPhone SE 1\u00AA gen, Android compacto
    else if (logicalW <= 360) scale = 0.82; // Galaxy S (base), Pixel 6a, Moto G
    else if (logicalW <= 375) scale = 0.83; // iPhone 6/7/8/SE 2\u00AA/3\u00AA
    else if (logicalW <= 390) scale = 0.85; // iPhone 12/13/14 Pro, Pixel 7
    else if (logicalW <= 393) scale = 0.85; // iPhone 14/15, Pixel 8
    else if (logicalW <= 400) scale = 0.86; // Galaxy S22, Pixel 6
    else if (logicalW <= 412) scale = 0.87; // Pixel 6 Pro, Galaxy S21+
    else if (logicalW <= 414) scale = 0.88; // iPhone 8 Plus, XR, 11
    else if (logicalW <= 420) scale = 0.88; // Galaxy S23+, OnePlus
    else if (logicalW <= 430) scale = 0.90; // iPhone 14/15 Pro Max
    else if (logicalW <= 448) scale = 0.90; // Galaxy S23 Ultra, Pixel Fold (fechado)
    else if (logicalW <= 480) scale = 0.92; // tablets pequenos, Android landscape
    else if (logicalW <= 600) scale = 0.95; // tablets 7" e Android landscape grande
    // acima de 600px = tablet/desktop, escala 1.0

    const meta = document.createElement('meta');
    meta.name = 'viewport';
    meta.content = `width=device-width, initial-scale=${scale}, viewport-fit=cover`;
    document.head.appendChild(meta);
  })();
</script>
<title>Estoque — Sesconetto's Pizzeria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Remove native number spinners */
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }

  :root {
    /* Sesconetto's brand: deep Italian green + warm parchment */
    --accent: #26743E;
    --accent-light: #E6F2EB;
    --accent-dark: #1A5229;
    --accent-hover: #1E5E32;
    --gold: #B8922A;
    --gold-light: #F5EDD8;

    --sidebar-bg: #0C1A0F;
    --sidebar-border: #1A3020;
    --sidebar-text: #A8C4AE;
    --sidebar-label: #2D4A34;
    --sidebar-active-bg: #1A3A20;
    --sidebar-active: #5DBF7A;

    --bg: #EDEAD8;
    --bg-2: #E4E0CC;
    --surface: #FDFCF7;
    --surface-2: #F5F2E8;
    --border: #C8C4AA;
    --border-light: #DAD7C5;

    --text: #1A1A12;
    --text-2: #5A5740;
    --text-3: #9A9880;
    --text-inv: #F0EDE0;

    --success: #26743E;
    --success-bg: #E8F5EC;
    --warning: #8A6A10;
    --warning-bg: #FBF3DC;
    --danger: #8B2020;
    --danger-bg: #FDEAEA;

    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 2px 8px rgba(10,30,15,.10), 0 0 0 1px rgba(10,30,15,.06);
  }

  body {
    font-family: 'Lato', 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* SIDEBAR */
  #sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    border-right: 1px solid var(--sidebar-border);
  }

  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--sidebar-border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
  }

  .logo-label {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: #E8F2EA;
    letter-spacing: 0.2px;
    line-height: 1.2;
    display: block;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--sidebar-label);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-top: 2px;
    display: block;
  }

  .nav-section {
    padding: 16px 12px 8px;
  }

  .nav-label {
    font-size: 10px;
    color: var(--sidebar-label);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding: 0 10px;
    margin-bottom: 4px;
    display: block;
    font-weight: 700;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--sidebar-text);
    font-size: 13.5px;
    transition: background 0.15s, color 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: 'Lato', sans-serif;
  }

  .nav-item:hover { background: rgba(255,255,255,.05); color: #C8E8CE; }
  .nav-item.active { background: var(--sidebar-active-bg); color: var(--sidebar-active); font-weight: 700; }
  .nav-item svg { flex-shrink: 0; }

  .sidebar-footer {
    margin-top: auto;
    padding: 14px 20px;
    border-top: 1px solid var(--sidebar-border);
    font-size: 10px;
    color: var(--sidebar-label);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* MAIN */
  #main {
    margin-left: 220px;
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1.5px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }

  .topbar-date {
    font-size: 12px;
    color: var(--text-3);
  }

  .content {
    padding: 28px 32px;
    flex: 1;
  }

  /* CARDS */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }

  .metric-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow);
  }

  .metric-label {
    font-size: 11px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .metric-value {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    line-height: 1;
    color: var(--text);
  }

  .metric-value.success { color: var(--success); }
  .metric-value.danger { color: var(--danger); }
  .metric-value.accent { color: var(--accent); }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .table-header {
    padding: 14px 18px;
    border-bottom: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: var(--surface-2);
  }

  .table-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: var(--surface-2);
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1.5px solid var(--border);
  }

  tbody tr { border-bottom: 1px solid var(--border-light); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #F8F6EF; }

  td {
    padding: 11px 16px;
    font-size: 13px;
    color: var(--text);
  }

  td.muted { color: var(--text-3); }
  td.secondary { color: var(--text-2); }

  /* Collapsible category header */
  .cat-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #EAF2EC;
    border: none;
    border-bottom: 1.5px solid var(--border);
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--accent-dark);
    text-align: left;
    transition: background .12s;
  }
  .cat-toggle:hover { background: #DDF0E3; }
  .cat-toggle .cat-chevron {
    margin-left: auto;
    font-size: 10px;
    color: var(--accent);
    transition: transform .2s;
    display: inline-block;
  }
  .cat-toggle.open .cat-chevron { transform: rotate(180deg); }
  .cat-toggle .cat-count {
    font-weight: 400;
    color: var(--accent);
    font-size: 10px;
    margin-left: 4px;
    text-transform: none;
    letter-spacing: 0;
    opacity: 0.7;
  }
  /* Receipt checklist modal */
  .checklist-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--border-light);
    font-size: 13px;
  }
  .checklist-row:last-child { border-bottom: none; }
  .check-name { flex: 1; font-weight: 500; }
  .check-sent { font-size: 11px; color: var(--text-3); min-width: 90px; text-align: right; }
  .check-recv-inp {
    width: 64px; padding: 4px 8px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
    text-align: center; outline: none; background: var(--surface); color: var(--text);
  }
  .check-recv-inp.ok { border-color: var(--success); color: var(--success); }
  .check-recv-inp.diff { border-color: var(--danger); color: var(--danger); }

  /* Category row stretches full width */
  .cat-row { background: none; }
  .cat-row:hover { background: none !important; }
  .cat-row > td { padding: 0 !important; border: none; }
  .cat-toggle { box-sizing: border-box; width: 100%; }

  .qty-controls { display: flex; align-items: center; gap: 5px; justify-content: flex-end; }
  .qty-btn-sm {
    width: 26px; height: 26px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-2);
    font-size: 16px; font-weight: 400;
    cursor: pointer; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .12s, color .12s, background .12s;
    flex-shrink: 0;
  }
  .qty-btn-sm:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .qty-btn-sm:active { transform: scale(0.93); }
  .qty-inp-sm {
    width: 52px; height: 32px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    text-align: center;
    font-size: 15px; font-weight: 600;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color .12s;
  }
  .qty-inp-sm:focus { border-color: var(--accent); }
  .qty-inp-sm.has-val { border-color: var(--success); color: var(--success); }
  .qty-inp-sm.has-error { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }

  /* Post-confirmation modal */
  .confirm-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10,20,12,.6);
    z-index: 600;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .confirm-modal-box {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: 0 12px 48px rgba(0,0,0,.3);
    width: 100%; max-width: 420px;
    overflow: hidden;
  }
  .confirm-modal-top {
    background: var(--accent);
    padding: 24px 24px 20px;
    text-align: center;
  }
  .confirm-modal-icon {
    font-size: 40px; line-height: 1; margin-bottom: 10px;
  }
  .confirm-modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 700;
    color: #fff; margin-bottom: 4px;
  }
  .confirm-modal-sub {
    font-size: 13px; color: rgba(255,255,255,.8);
  }
  .confirm-modal-body {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border-light);
    max-height: 220px; overflow-y: auto;
  }
  .confirm-modal-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border-light);
    font-size: 13px;
  }
  .confirm-modal-row:last-child { border-bottom: none; }
  .confirm-modal-item { color: var(--text); font-weight: 500; flex: 1; }
  .confirm-modal-qty  { color: var(--accent); font-weight: 700; margin-left: 12px; white-space: nowrap; }
  .confirm-modal-actions {
    padding: 16px 20px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .confirm-modal-actions .btn {
    width: 100%; justify-content: center; padding: 11px;
    font-size: 14px;
  }

  /* Price input inline */
  .price-cell { position: relative; }

  /* -- FEATURES 1-9 ---------------------------------------- */

  /* Alert banner (stock minimum warnings) */
  .alert-banner {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 11px 14px; border-radius: var(--radius-sm);
    margin-bottom: 10px; font-size: 13px; cursor: default;
  }
  .alert-banner.warn  { background: var(--warning-bg); border: 1px solid #D4A017; color: var(--warning); }
  .alert-banner.danger{ background: var(--danger-bg);  border: 1px solid #C07070; color: var(--danger); }
  .alert-banner-icon  { font-size: 16px; flex-shrink: 0; }
  .alert-banner-body  { flex: 1; }
  .alert-banner-title { font-weight: 700; margin-bottom: 2px; }
  .alert-banner-items { font-size: 12px; opacity: .85; }

  /* Dashboard grid */
  .dash-unit-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
    margin-bottom: 16px;
  }
  .dash-unit-header {
    padding: 12px 16px; background: var(--surface-2);
    border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700;
  }
  .dash-semaphore {
    display: flex; gap: 6px; align-items: center;
  }
  .sem-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .sem-red    { background: var(--danger); }
  .sem-yellow { background: #E8A020; }
  .sem-green  { background: var(--success); }
  .dash-items-grid {
    padding: 10px 16px 14px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px;
  }
  .dash-item-chip {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 9px; border-radius: 6px;
    background: var(--surface-2); font-size: 12px;
    border: 1px solid var(--border-light);
  }
  .dash-item-chip .sem-dot { width: 8px; height: 8px; }
  .dash-item-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dash-item-qty  { font-weight: 700; font-size: 12px; }

  /* Template button */
  .template-btn {
    background: var(--gold-light); border: 1.5px solid var(--gold);
    color: var(--gold); border-radius: var(--radius-sm);
    padding: 8px 14px; font-family: 'Lato', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .template-btn:hover { background: #EFE3C0; }

  /* Min qty field in catalog */
  .min-inp {
    width: 52px; padding: 3px 6px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-family: 'Lato', sans-serif; font-size: 12px; text-align: right;
    outline: none; background: var(--surface); color: var(--text);
  }
  .min-inp:focus { border-color: var(--gold); }

  /* Chart bars */
  .chart-bar-wrap { display: flex; align-items: flex-end; gap: 4px; height: 80px; margin-top: 8px; }
  .chart-bar-col  { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .chart-bar      { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; background: var(--accent); transition: height .3s; }
  .chart-label    { font-size: 10px; color: var(--text-3); white-space: nowrap; }
  .chart-value    { font-size: 11px; font-weight: 700; color: var(--text-2); }

  /* Notification dot */
  .nav-item-notif { position: relative; }
  .notif-dot {
    position: absolute; top: 6px; right: 6px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--danger); border: 1.5px solid var(--sidebar-bg);
  }

  /* Push notification toast variant */
  #push-toast {
    position: fixed; top: 80px; right: 16px; left: 16px;
    max-width: 360px; margin: 0 auto;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,.2);
    padding: 14px 16px; z-index: 800;
    display: none; flex-direction: column; gap: 6px;
    animation: slideDown .25s ease;
  }
  @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .push-toast-title { font-weight: 700; font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 7px; }
  .push-toast-body  { font-size: 13px; color: var(--text-2); }
  .push-toast-actions { display: flex; gap: 8px; margin-top: 4px; }

  /* Checklist for feature 9 */
  .checklist-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0; border-bottom: 1px solid var(--border-light);
    font-size: 13px;
  }
  .checklist-row:last-child { border-bottom: none; }
  .check-name { flex: 1; }
  .check-sent { color: var(--text-3); font-size: 12px; min-width: 60px; text-align: right; }
  .check-recv-inp {
    width: 52px; padding: 3px 6px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 600;
    text-align: center; outline: none;
    -webkit-appearance: none; -moz-appearance: textfield;
  }
  .check-recv-inp:focus { border-color: var(--accent); }
  .check-recv-inp.ok   { border-color: var(--success); color: var(--success); }
  .check-recv-inp.diff { border-color: var(--danger);  color: var(--danger); }

  /* Receipt divergence */
  .divergence-banner {
    background: var(--danger-bg); border: 1.5px solid #C07070;
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: 13px; color: var(--danger); margin-top: 10px;
    font-weight: 600;
  }
  .order-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 14px;
  }
  .order-card-header {
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; flex-wrap: wrap;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border-light);
  }
  .order-meta { flex: 1; min-width: 0; }
  .order-unit { font-size: 15px; font-weight: 700; color: var(--text); font-family: 'Playfair Display', serif; }
  .order-sub  { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .order-badge {
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px;
  }
  .order-badge.pendente  { background: #FEF3E2; color: #8A5A0A; }
  .order-badge.separando { background: #E8F5EC; color: #26743E; }
  .order-badge.enviado   { background: #EAF0FF; color: #2A4B9A; }
  .order-items-list { padding: 10px 16px; }
  .order-item-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border-bottom: 1px solid var(--border-light);
    font-size: 13px;
  }
  .order-item-row:last-child { border-bottom: none; }
  .order-item-name { color: var(--text); font-weight: 500; flex: 1; }
  .order-item-qty  { color: var(--accent); font-weight: 700; margin-left: 12px; white-space: nowrap; }
  .order-actions   { padding: 10px 16px; display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
  .empty-orders { padding: 40px; text-align: center; color: var(--text-3); font-size: 14px; }
  .empty-orders svg { opacity: .3; margin-bottom: 12px; }
  .price-view { cursor: pointer; display: flex; align-items: center; gap: 4px; justify-content: flex-end; }
  .price-view:hover .price-edit-icon { opacity: 1; }
  .price-edit-icon { opacity: 0; font-size: 11px; color: var(--accent); transition: opacity .15s; }
  .price-inp {
    width: 90px; padding: 3px 6px;
    border: 1.5px solid var(--accent);
    border-radius: var(--radius-sm);
    font-family: 'Lato', sans-serif;
    font-size: 12px; font-weight: 600;
    text-align: right; outline: none;
    background: var(--surface);
    color: var(--text);
  }
  .price-total { font-weight: 600; color: var(--accent-dark); }

  /* -- BATCH OPERATION UI ------------------------------ */
  .dest-box {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .dest-box select {
    margin-top: 4px;
    background: var(--surface-2);
    font-weight: 600;
    color: var(--accent-dark);
  }

  .batch-summary {
    position: sticky;
    top: 0;
    z-index: 30;
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    box-shadow: 0 2px 12px rgba(38,116,62,.18);
  }

  .batch-info {
    font-size: 14px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    min-width: 0;
  }

  .batch-count {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .batch-empty {
    color: var(--text-3);
    font-style: italic;
    font-size: 13px;
  }

  .batch-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .batch-actions .btn-primary {
    padding: 9px 18px;
    font-size: 13px;
  }

  @media (max-width: 599px) {
    .batch-summary {
      padding: 10px 12px;
      gap: 8px;
    }
    .batch-info { font-size: 12px; }
    .batch-count { font-size: 18px; }
    .batch-actions .btn-primary { padding: 8px 12px; font-size: 12px; }
  }

  /* Mobile table fixes */
  @media (max-width: 599px) {
    .qty-inp-sm { width: 54px; min-width: 54px; max-width: 54px; height: 36px; font-size: 15px; }
    .qty-btn-sm { width: 34px; min-width: 34px; height: 36px; font-size: 18px; flex-shrink: 0; }
    .qty-controls { gap: 4px; flex-wrap: nowrap; }

    /* Hide MÍN column on mobile stock-table */
    .stock-table .col-min { display: none; }
    .stock-table td.col-min { display: none; }
    .stock-table .col-unit { display: none; }
    .stock-table td.col-unit { display: none; }

    /* Catalog table mobile — keep MÍN col, hide Medida */
    .catalog-table .col-unit  { display: none; }
    .catalog-table td.col-unit { display: none; }
    .catalog-table .col-min   { display: table-cell; }
    .catalog-table td.col-min  { display: table-cell; }
    .catalog-table { table-layout: auto; width: 100%; font-size: 11px; }
    .catalog-table td, .catalog-table th { padding: 5px 3px; }
    .catalog-table .cat-inline-min { display: none; } /* hide inline min on mobile */

    /* Fix table layout on mobile */
    .stock-table { table-layout: auto; width: 100%; }
    .stock-table th:first-child,
    .stock-table td.item-name { width: auto; }
    .stock-table td.qty-controls-cell {
      width: 1px;
      white-space: nowrap;
      padding: 6px 4px 6px 0 !important;
    }

    /* Hide separate Un. column on mobile - unit shown inline with item name */
    .stock-table .col-unit { display: none; }
    .stock-table td.item-name { padding-right: 4px; }
    .stock-table td.qty-controls-cell { padding: 6px 8px 6px 0 !important; }
    .item-unit-inline {
      display: block;
      font-size: 11px;
      color: var(--text-3);
      font-weight: 400;
      margin-top: 2px;
      text-transform: lowercase;
    }
  }

  /* Show unit/min info inline below item name - always visible */
  .item-unit-inline {
    display: block;
    font-size: 11px;
    color: var(--text-3);
    font-weight: 400;
    margin-top: 2px;
  }

  /* MÍN column: hidden in stock-table (CPD panel), visible in catalog-table */
  .stock-table .col-min    { display: none; }
  .stock-table td.col-min  { display: none; }
  /* catalog-table: MÍN always visible (desktop + mobile) */
  .catalog-table .col-min    { display: table-cell; }
  .catalog-table td.col-min  { display: table-cell; }

  @media (max-width: 599px) {
    .item-unit-inline { text-transform: lowercase; }
  }

  .qty-cell { font-weight: 600; font-size: 14px; }
  .qty-cell.zero { color: var(--danger); }
  .qty-cell.low { color: var(--warning); }
  .qty-cell.ok { color: var(--success); }

  /* BADGE */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .badge.entrada { background: var(--success-bg); color: var(--success); }
  .badge.saida { background: var(--warning-bg); color: var(--warning); }

  /* FORM */
  .form-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    max-width: 520px;
    box-shadow: var(--shadow);
  }

  .form-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1.5px solid var(--border);
    color: var(--text);
  }

  .form-group { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-2);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input[type="text"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    padding: 10px 13px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.15s;
    outline: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }

  .hint {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 5px;
  }

  .hint.danger { color: var(--danger); }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:active { transform: scale(0.98); }

  .btn-success {
    background: var(--success);
    color: #fff;
  }

  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-2);
  }

  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .btn-sm {
    padding: 6px 12px;
    font-size: 12px;
  }

  /* UNIT TABS */
  .unit-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .unit-tab {
    padding: 7px 18px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text-2);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }

  .unit-tab:hover { border-color: var(--accent); color: var(--accent); }
  .unit-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* SEARCH */
  .search-wrap { position: relative; }
  .search-wrap input { padding-left: 36px; }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-3);
    pointer-events: none;
  }

  /* MOVEMENTS */
  .movement-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-light);
    font-size: 13px;
  }
  .movement-row:last-child { border-bottom: none; }

  /* Batch movement row — new grouped style */
  .batch-mov-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border-light);
    cursor: pointer;
    transition: background .12s;
  }
  .batch-mov-row:last-child { border-bottom: none; }
  .batch-mov-row:hover { background: #F3F0E8; }

  .batch-mov-info { flex: 1; min-width: 0; }
  .batch-mov-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .batch-mov-sub   { font-size: 11px; color: var(--text-3); }
  .batch-mov-arrow { color: var(--text-3); font-size: 13px; flex-shrink: 0; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10,20,12,.55);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-box {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: 0 8px 40px rgba(0,0,0,.25);
    width: 100%; max-width: 500px;
    max-height: 88vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; background: var(--surface-2);
  }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--text); }
  .modal-close {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1.5px solid var(--border); background: none;
    font-size: 16px; cursor: pointer; color: var(--text-2);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-sans);
  }
  .modal-close:hover { background: var(--border-light); }
  .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1.5px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }

  .mov-item { flex: 1; font-weight: 500; }
  .mov-qty { font-weight: 600; min-width: 70px; text-align: right; }
  .mov-dest { color: var(--text-3); font-size: 12px; min-width: 90px; }
  .mov-date { color: var(--text-3); font-size: 11px; min-width: 80px; text-align: right; }

  /* EMPTY STATE */
  .empty {
    padding: 40px;
    text-align: center;
    color: var(--text-3);
    font-size: 13px;
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--accent);
    color: #fff;
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 700;
    display: none;
    align-items: center;
    gap: 8px;
    z-index: 999;
    animation: slideUp 0.2s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.22);
  }

  @keyframes slideUp {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* -- LOGIN SCREEN --------------------------------------- */
  #login-screen {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--sidebar-bg);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-box {
    background: #0C1A0F;
    border: 1px solid var(--sidebar-border);
    border-radius: 16px;
    padding: 36px 32px;
    width: 100%; max-width: 380px;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }
  .login-logo {
    text-align: center; margin-bottom: 28px;
  }
  .login-logo-icon {
    width: 56px; height: 56px;
    background: var(--accent);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 12px;
  }
  .login-logo-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700;
    color: #E8F2EA; line-height: 1.2;
  }
  .login-logo-sub {
    font-size: 11px; color: var(--sidebar-label);
    text-transform: uppercase; letter-spacing: 1px;
    margin-top: 4px;
  }
  .login-field { margin-bottom: 16px; }
  .login-label {
    display: block; font-size: 11px; font-weight: 700;
    color: #5A7A62; text-transform: uppercase;
    letter-spacing: 0.6px; margin-bottom: 7px;
  }
  .login-input {
    width: 100%; padding: 11px 14px;
    background: #152018; border: 1.5px solid #2A4030;
    border-radius: 8px; color: #E8F2EA;
    font-family: 'Lato', sans-serif; font-size: 14px;
    outline: none; transition: border-color .15s;
  }
  .login-input:focus { border-color: var(--accent); }
  .login-input option { background: #152018; color: #E8F2EA; }
  .login-btn {
    width: 100%; padding: 13px;
    background: var(--accent); border: none;
    border-radius: 8px; color: #fff;
    font-family: 'Lato', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
    transition: background .15s;
    letter-spacing: 0.3px;
  }
  .login-btn:hover { background: var(--accent-hover); }
  .login-error {
    font-size: 12px; color: #EF9090;
    margin-top: 8px; text-align: center; display: none;
  }

  /* User badge in topbar */
  .user-badge {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px 5px 6px;
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    border-radius: 20px; cursor: pointer;
    transition: border-color .15s;
  }
  .user-badge:hover { border-color: var(--accent); }
  .user-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .user-info { display: flex; flex-direction: column; line-height: 1.2; }
  .user-name { font-size: 12px; font-weight: 700; color: var(--text); }
  .user-unit { font-size: 10px; color: var(--text-3); }

  /* Unit badge next to sidebar logo */
  .sidebar-unit-badge {
    font-size: 10px; font-weight: 700;
    background: var(--accent); color: #fff;
    padding: 2px 8px; border-radius: 10px;
    margin-top: 4px; display: inline-block;
    text-transform: uppercase; letter-spacing: 0.4px;
  }

  /* -- TWO-COL FORM ---------------------------------------- */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  /* -- MOBILE FIRST ------------------------------------------ */

  #sidebar { display: none; }
  #main    { margin-left: 0; padding-bottom: 0; }

  .content { padding: 16px 12px; }
  .topbar  { padding: 12px 16px; }
  .topbar-date { display: none; }

  .form-row { grid-template-columns: 1fr; }
  .form-card { max-width: 100%; }
  .metrics-grid { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .metric-card  { padding: 12px 14px; }
  .metric-value { font-size: 28px; }

  /* Hamburger — hidden by default, shown via JS on mobile */
  #hamburger-btn {
    display: none;
    align-items: center; justify-content: center;
    width: 38px; height: 38px;
    background: var(--sidebar-bg);
    border: 1.5px solid var(--sidebar-border);
    border-radius: 8px;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    margin-right: 10px;
  }
  #hamburger-btn svg { display: block; }

  /* Drawer — always hidden off-screen, only visible when .open */
  #drawer-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 300;
  }
  #drawer-overlay.open { display: block; }

  #mobile-drawer {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 80%; max-width: 280px;
    background: var(--sidebar-bg);
    z-index: 301;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    display: flex; flex-direction: column;
    overflow-y: auto;
    padding-bottom: env(safe-area-inset-bottom, 16px);
  }
  #mobile-drawer.open { transform: translateX(0); }

  .drawer-header {
    display: flex; align-items: center; gap: 12px;
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--sidebar-border);
    flex-shrink: 0;
  }
  .drawer-close {
    margin-left: auto; width: 32px; height: 32px;
    background: none; border: none; color: #5A7A62;
    font-size: 22px; font-weight: 300; cursor: pointer;
    border-radius: 6px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .drawer-section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--sidebar-label);
    padding: 14px 18px 4px;
  }
  .drawer-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 18px;
    border: none; background: none; width: 100%;
    text-align: left; cursor: pointer;
    color: var(--sidebar-text);
    font-family: 'Lato', sans-serif;
    font-size: 14px; font-weight: 500;
    -webkit-tap-highlight-color: transparent;
  }
  .drawer-item.active {
    background: var(--sidebar-active-bg);
    color: var(--sidebar-active);
    font-weight: 700;
  }
  .drawer-item svg { flex-shrink: 0; opacity: .8; }
  .drawer-item.active svg { opacity: 1; }
  .drawer-divider {
    height: 1px; background: var(--sidebar-border);
    margin: 6px 18px;
  }
  .drawer-logout {
    margin-top: auto;
    border-top: 1px solid var(--sidebar-border);
    padding: 8px 4px 0;
    flex-shrink: 0;
  }
  .drawer-logout .drawer-item { color: #EF9090; }

  #toast {
    bottom: 28px;
    right: 12px;
    left: 12px;
    font-size: 13px;
  }

  #bottom-nav { display: none !important; }

  /* -- DESKTOP (sidebar visible, bottom-nav hidden) ----------- */
  @media (min-width: 600px) {
    #sidebar     { display: flex; }
    #main        { margin-left: 220px; padding-bottom: 0; }
    .content     { padding: 28px 32px; }
    .topbar      { padding: 14px 32px; }

<script>

firebase.initializeApp(firebaseConfig);
const db   = firebase.database();
const auth = firebase.auth();

// Cache local dos dados (atualizado pelo listener em tempo real)
window._fb = {
  cache:    {},
  ready:    false,
  pendingWrites: []
};

// Login anonimo automatico
auth.signInAnonymously()
  .then(() => console.log('[Firebase] Autenticado'))
  .catch(e => console.error('[Firebase] Erro de autenticacao:', e));

// Listener em tempo real - sincroniza TODOS os dados com o app
auth.onAuthStateChanged(user => {
  if (!user) return;
  window._fb.ready = true;
  _flushPendingWrites(); // processa qualquer write que aconteceu antes do auth

  db.ref('dados').on('value', snapshot => {
    const data = snapshot.val() || {};
    window._fb.cache = data;

    if (typeof catalog !== 'undefined') {
      const fbSeedVer    = data.pizza_seed_ver;
      const localSeedVer = window._seedVersion || null;
      const fbCatalog    = data.pizza_catalog;
      const fbCatalogLen = Array.isArray(fbCatalog) ? fbCatalog.length : 0;

      if (fbCatalogLen === 0) {
        // Banco vazio — primeira execução. Envia o seed para o Firebase.
        console.log('[Firebase] Banco vazio, enviando catálogo inicial...');
        const catToSend = (typeof SEED_CATALOG !== 'undefined' && SEED_CATALOG.length > 0)
          ? SEED_CATALOG : catalog;
        if (catToSend && catToSend.length > 0) {
          db.ref('dados/pizza_catalog').set(catToSend)
            .then(() => db.ref('dados/pizza_seed_ver').set(localSeedVer || 'v10'))
            .then(() => console.log('[Firebase] Catálogo inicial enviado:', catToSend.length, 'itens'))
            .catch(e => console.error('[Firebase] Erro ao enviar catálogo:', e));
          catalog.length = 0;
          catToSend.forEach(i => catalog.push(i));
        }
      } else {
        // Firebase JÁ TEM catálogo — sempre usa o do Firebase, nunca sobrescreve.
        // Edições feitas pelo usuário ficam salvas aqui.
        catalog.length = 0;
        fbCatalog.forEach(i => catalog.push(i));
        console.log('[Firebase] Catálogo carregado do banco:', fbCatalog.length, 'itens');
      }

      if (data.pizza_cpd) {
        Object.keys(cpd).forEach(k => delete cpd[k]);
        Object.assign(cpd, data.pizza_cpd);
        saveLocal('pizza_cpd', cpd);
      }
      if (data.pizza_minimums) {
        Object.keys(minimums).forEach(k => delete minimums[k]);
        Object.assign(minimums, data.pizza_minimums);
        saveLocal('pizza_minimums', minimums);
      }
      if (data.pizza_prices) {
        Object.assign(prices, data.pizza_prices);
        saveLocal('pizza_prices', prices);
      }
      if (data.pizza_unit_minimums) {
        if (!window.unitMinimums) window.unitMinimums = {};
        Object.keys(window.unitMinimums).forEach(k => delete window.unitMinimums[k]);
        Object.assign(window.unitMinimums, data.pizza_unit_minimums);
        saveLocal('pizza_unit_minimums', window.unitMinimums);
      }
      if (data.pizza_units) {
        Object.keys(unitStock).forEach(k => delete unitStock[k]);
        Object.assign(unitStock, data.pizza_units);
        saveLocal('pizza_units', unitStock);
      }
      if (data.pizza_orders) {
        orders.length = 0;
        data.pizza_orders.forEach(o => orders.push(o));
        saveLocal('pizza_orders', orders);
      }
      if (data.pizza_movements) {
        movements.length = 0;
        data.pizza_movements.forEach(m => movements.push(m));
        saveLocal('pizza_movements', movements);
      }
      if (data.pizza_catalog && data.pizza_catalog.length > 0) {
        saveLocal('pizza_catalog', data.pizza_catalog);
      }
      if (data.pizza_envios) {
        envios = data.pizza_envios;
        saveLocal('pizza_envios', envios);
      }
      if (data.pizza_shipments) {
        const prevTransitIds = new Set(shipments.filter(s=>s.status==='em_transito').map(s=>s.id));
        shipments = data.pizza_shipments;
        saveLocal('pizza_shipments', shipments);
        // Notificar unidade sobre novos envios em trânsito
        if (session && !isCPD()) {
          shipments.filter(s => s.unit === session.unit && s.status === 'em_transito' && !prevTransitIds.has(s.id))
            .forEach(s => {
              if (typeof showPushNotif === 'function') {
                showPushNotif('\uD83D\uDE9A Entrega a caminho!',
                  'O CPD enviou ' + s.items.length + (s.items.length===1?' item':' itens') + ' para ' + s.unit + '.', []);
              }
            });
        }
      }
      if (data.pizza_pendencias) {
        pendencias = data.pizza_pendencias;
        saveLocal('pizza_pendencias', pendencias);
      }
      // Só re-renderiza se foi outro dispositivo que enviou — não write local
      if (typeof render === 'function' && session && !window._fb.localWrite) render();
    }

    console.log('[Firebase] Dados sincronizados');
  });

  // Notificacoes em tempo real para a unidade logada
  if (typeof session !== 'undefined' && session) {
    const notifPath = session.unit === 'cpd'
      ? 'notificacoes/cpd'
      : 'notificacoes/unidades/' + encodeURIComponent(session.unit);

    db.ref(notifPath).on('child_added', snap => {
      const n = snap.val();
      if (!n) return;
      if (typeof showPushNotif === 'function') {
        showPushNotif(n.titulo, n.corpo, []);
      }
      snap.ref.remove(); // remove apos exibir
    });
  }
});
</script>

function load(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    if (!v) return fallback;
    const parsed = JSON.parse(v);
    // Return fallback if result is an empty array but fallback is not
    if (Array.isArray(parsed) && parsed.length === 0 && Array.isArray(fallback) && fallback.length > 0) return fallback;
    return parsed;
  }
  catch(e) { return fallback; }
}
// Salva APENAS no localStorage, sem disparar sync Firebase
// Usado pelo listener do Firebase para cachear dados recebidos
function saveLocal(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
}

// Chaves que devem sincronizar com o Firebase em tempo real
const FIREBASE_SYNC_KEYS = new Set([
  'pizza_cpd', 'pizza_units', 'pizza_movements', 'pizza_orders',
  'pizza_catalog', 'pizza_minimums', 'pizza_prices', 'pizza_unit_minimums',
  'pizza_envios', 'pizza_shipments', 'pizza_pendencias'
]);

function save(key, data) {
  // Sempre salva no localStorage (cache local e fallback offline)
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}

  // Sincroniza com Firebase se for uma chave operacional
  if (FIREBASE_SYNC_KEYS.has(key)) {
    try {
      if (window._fb && window._fb.ready && typeof db !== 'undefined') {
        // Marca write local: impede que o listener re-renderize a tela
        // quando recebe de volta o próprio dado que acabou de enviar
        window._fb.localWrite = true;
        clearTimeout(window._fb.localWriteTimer);
        window._fb.localWriteTimer = setTimeout(() => { window._fb.localWrite = false; }, 3000);
        db.ref('dados/' + key).set(data)
          .catch(e => console.warn('[Firebase] Erro ao salvar ' + key + ':', e));
      } else {
        // Firebase ainda não pronto — enfileira para tentar em seguida
        if (!window._fb) window._fb = { ready: false, pendingWrites: [] };
        window._fb.pendingWrites = window._fb.pendingWrites || [];
        window._fb.pendingWrites.push({ key, data });
      }
    } catch(e) {
      console.warn('[Firebase] save() erro inesperado:', e);
    }
  }
}

// Processa writes pendentes assim que o Firebase ficar pronto
function _flushPendingWrites() {
  if (!window._fb || !window._fb.pendingWrites) return;
  const pending = window._fb.pendingWrites.splice(0);
  if (pending.length === 0) return;
  console.log('[Firebase] Processando', pending.length, 'writes pendentes...');
  pending.forEach(({ key, data }) => {
    db.ref('dados/' + key).set(data)
      .catch(e => console.warn('[Firebase] Erro no write pendente ' + key + ':', e));
  });
}

function logAction(type, description, extra) {
  if (!session) return;
  const entry = {
    id: 'log_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    ts: new Date().toISOString(),
    user: session.name,
    unit: session.unit === 'cpd' ? 'CPD' : session.unit,
    role: session.role,
    type,       // 'pedido' | 'separacao' | 'envio' | 'recebimento' | 'entrada' | 'saida' | 'catalogo' | 'estoque'
    description,
    extra: extra || null,
  };
  activityLog.unshift(entry);
  if (activityLog.length > 500) activityLog = activityLog.slice(0, 500); // cap at 500
  save('pizza_log', activityLog);
}

// Senhas por unidade (n\u00E3o exibir em logs ou console)
// ═══ JANELAS DE CONTAGEM (unidades) ═══
// Dia operacional: 15h00 do dia até 03h00 da manhã seguinte.
// 0=Domingo, 1=Segunda, 2=Terça, 3=Quarta, 4=Quinta, 5=Sexta, 6=Sábado
// 'ALL' libera todas as categorias naquele dia.
// >>> EDITE AQUI quando a lista categoria × dia for definida <<<
const CONTAGEM_JANELAS = {
  0: ['ALL'],   // Domingo: todas as categorias
  2: ['ALL'],   // Terça: todas as categorias
  3: ['Bebidas'], // Quarta: bar/bebidas
  4: ['ALL'],   // Quinta: todas as categorias
};
const DIAS_SEMANA = ['Domingo','Segunda','Ter\u00E7a','Quarta','Quinta','Sexta','S\u00E1bado'];

// Retorna o dia operacional atual (0-6). Entre 0h-3h, conta como o dia anterior.
function diaOperacional() {
  const now = new Date();
  let d = now.getDay();
  if (now.getHours() < 3) d = (d + 6) % 7;
  return d;
}

// Está dentro do horário de funcionamento (15h-3h)?
function dentroDoHorario() {
  const h = new Date().getHours();
  return h >= 15 || h < 3;
}

// A categoria pode ser contada agora? (CPD sempre pode)
function categoriaLiberada(cat) {
  if (isCPD()) return true;
  if (!dentroDoHorario()) return false;
  const allowed = CONTAGEM_JANELAS[diaOperacional()];
  if (!allowed) return false;
  return allowed.includes('ALL') || allowed.includes(cat);
}

// Próxima janela em que a categoria estará liberada (para mensagens)
function proximaJanela(cat) {
  const hoje = diaOperacional();
  for (let i = 0; i <= 7; i++) {
    const d = (hoje + i) % 7;
    const allowed = CONTAGEM_JANELAS[d];
    if (allowed && (allowed.includes('ALL') || allowed.includes(cat))) {
      if (i === 0 && !dentroDoHorario()) return DIAS_SEMANA[d] + ' a partir das 15h';
      if (i === 0) return 'hoje';
      return DIAS_SEMANA[d] + ' a partir das 15h';
    }
  }
  return 'a definir';
}

// LOGIN/LOGOUT
function doLogin() {
  const name = document.getElementById('login-name').value.trim();
  const unit = document.getElementById('login-unit').value;
  const role = document.getElementById('login-role').value;
  const pass = document.getElementById('login-pass').value;
  const errDiv = document.getElementById('login-error');

  if (!name || !unit || !role || !pass) {
    errDiv.textContent = 'Preencha todos os campos para continuar.';
    errDiv.style.display = 'block';
    return;
  }

  // Validate password
  const expected = UNIT_PASSWORDS[unit];
  if (!expected || pass !== expected) {
    errDiv.textContent = 'Senha incorreta. Verifique com o respons\u00E1vel da unidade.';
    errDiv.style.display = 'block';
    // Shake animation
    const passInp = document.getElementById('login-pass');
    passInp.style.borderColor = 'var(--danger)';
    passInp.style.animation = 'none';
    setTimeout(() => { passInp.style.borderColor = ''; }, 2000);
    return;
  }

  errDiv.style.display = 'none';
  session = { name, unit, role };
  save('pizza_session', session);
  applySession();
}

function logout() {
  if (!confirm(`Sair da conta de ${session?.name || 'usu\u00E1rio'}?`)) return;
  session = null;
  save('pizza_session', null);
  // Clear password field for security
  const passInp = document.getElementById('login-pass');
  if (passInp) { passInp.value = ''; passInp.type = 'password'; }
  // Full reload is the most reliable way to reset all state
  // (works in Electron, Chrome, Safari)
  window.location.reload();
}

function applySession() {
  if (!session) {
    document.getElementById('login-screen').style.display = 'flex';
    return;
  }
  // Catálogo: usa seed apenas como fallback temporário.
  // O listener do Firebase sincroniza o catálogo real logo em seguida.
  if (!catalog || catalog.length === 0) {
    catalog = SEED_CATALOG.slice();
    try { localStorage.setItem('pizza_catalog', JSON.stringify(catalog)); } catch(e) {}
    // NÃO empurra para Firebase — o listener cuida disso corretamente
  }

  // Hide login screen
  document.getElementById('login-screen').style.display = 'none';

  // Update topbar user badge
  const initials = session.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('user-name-badge').textContent = session.name;
  document.getElementById('user-unit-badge').textContent =
    (session.unit === 'cpd' ? 'CPD' : session.unit) + ' \u00B7 ' + session.role;

  // Update sidebar unit badge
  const badge = document.getElementById('sidebar-unit-badge');
  if (badge) badge.textContent = session.unit === 'cpd' ? 'CPD' : session.unit;

  // Build sidebar nav based on allowed views
  buildSidebarNav();
  buildDrawerNav();
  updateHamburgerVisibility();

  // Navigate to default view
  currentView = defaultView();
  if (session.unit !== 'cpd') activeUnit = session.unit;

  setView(currentView);
}

// HELPERS
function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'cls') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (k === 'value' && (tag === 'input' || tag === 'textarea')) {
      e.setAttribute(k, v);
      e.value = v; // set live value too, not just HTML attribute
    }
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function itemSelect(selectId, withStock=false) {
  const sel = el('select', {id: selectId});
  sel.appendChild(el('option', {value:''}, 'Selecione um item...'));
  CATEGORIES.forEach(cat => {
    const items = catalog.filter(i => i.category === cat);
    if (!items.length) return;
    const grp = document.createElement('optgroup');
    grp.label = cat;
    items.forEach(i => {
      const label = withStock
        ? `${i.name}  (${cpd[i.id]||0} ${i.unit} no CPD)`
        : i.name;
      grp.appendChild(el('option', {value: i.id}, label));
    });
    sel.appendChild(grp);
  });
  return sel;
}

function buildStockTable(stockObj, searchInputId, onUpdate, opts) {
  opts = opts || {};
  const useMin   = opts.useMin !== false;   // false nas unidades: esconde tudo de mínimo
  const pdfLabel = opts.pdfLabel || null;   // se definido, mostra botão de PDF por categoria
  const lockByWindow = opts.lockByWindow === true; // unidades: trava fora da janela de contagem
  const editable = typeof onUpdate === 'function';
  const showMin  = false; // M\u00CDN column removed from stock table \u2014 editable only in Cat\u00E1logo
  const wrap = el('div', {});

  const searchWrap = el('div', {cls:'search-wrap', style:'margin-bottom:14px'});
  const searchIcon = el('span', {cls:'search-icon', html:'<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>'});
  const searchInp = el('input', {type:'text', placeholder:'Buscar item...', id: searchInputId || 'search-'+Date.now()});
  searchWrap.appendChild(searchIcon);
  searchWrap.appendChild(searchInp);
  wrap.appendChild(searchWrap);

  const colCount = editable ? (showMin ? '4' : '3') : '4';
  const tableWrap = el('div', {cls:'table-wrap'});
  const table = el('table', {cls: 'stock-table'});
  const thead = el('thead', {});
  if (editable) {
    thead.innerHTML = showMin
      ? '<tr><th>Item</th><th class="col-unit" style="width:12%">Medida</th><th class="col-min" style="width:10%;text-align:right;font-size:10px;color:var(--text-3)">M\u00CDN.</th><th style="width:40%;text-align:right">Quantidade</th></tr>'
      : '<tr><th>Item</th><th class="col-unit" style="width:14%">Medida</th><th style="width:46%;text-align:right">Quantidade</th></tr>';
  } else {
    thead.innerHTML = '<tr><th>Item</th><th style="width:18%;text-align:right">Qtd</th><th class="col-unit" style="width:18%">Medida</th><th style="width:8%"></th></tr>';
  }
  const tbody = el('tbody', {id:'tbody-'+searchInp.id});
  table.appendChild(thead);
  table.appendChild(tbody);
  tableWrap.appendChild(table);
  wrap.appendChild(tableWrap);

  let saveTimer = {};

  function updateQty(itemId, newQty, inp, tr, inlineSpan) {
    // Trava de janela: recusa gravação fora do horário/dia de contagem
    if (lockByWindow) {
      const it = catalog.find(i => i.id === itemId);
      if (it && !categoriaLiberada(it.category)) {
        toast('\uD83D\uDD12 Contagem de ' + it.category + ' dispon\u00EDvel ' + proximaJanela(it.category) + '.');
        return;
      }
    }
    const raw = typeof newQty === 'string' ? parseFloat(newQty.replace(',', '.')) : newQty;
    const q = Math.max(0, isNaN(raw) ? 0 : raw);
    stockObj[itemId] = q;
    inp.value = String(q);
    const min = useMin ? (minimums[itemId] || 0) : 0;
    const isZero = q === 0;
    const isLow  = min > 0 && q < min && !isZero;

    // Update input class
    if (isZero && min > 0) inp.className = 'qty-inp-sm has-error';
    else                   inp.className = 'qty-inp-sm has-val';

    // Update row background instantly (alertas de cor s\u00F3 com m\u00EDnimos ativos)
    if (tr) {
      tr.style.background = useMin ? (isZero ? 'var(--danger-bg)' : isLow ? 'var(--warning-bg)' : '') : '';
    }

    // Update inline min text color instantly
    if (inlineSpan) {
      const dotColor = isZero ? 'var(--danger)' : isLow ? '#E8A020' : '';
      inlineSpan.style.color = dotColor || 'var(--text-3)';
      inlineSpan.style.fontWeight = dotColor ? '600' : '400';
    }

    clearTimeout(saveTimer[itemId]);
    saveTimer[itemId] = setTimeout(() => onUpdate(itemId, q), 400);
  }

  // track open state per table instance -- all closed by default
  const openCats = Object.fromEntries(CATEGORIES.map(c => [c, false]));

  function renderRows(q) {
    tbody.innerHTML = '';
    const filtered = catalog.filter(i => i.name.toLowerCase().includes(q.toLowerCase()));
    if (!filtered.length) {
      tbody.appendChild(el('tr', {}, el('td', {colspan: colCount, cls:'empty'}, 'Nenhum item encontrado')));
      return;
    }
    const usedCats = CATEGORIES.filter(cat => filtered.some(i => i.category === cat));
    usedCats.forEach(cat => {
      const catItems = filtered.filter(i => i.category === cat);
      const isOpen = openCats[cat] !== false;

      // Header row with toggle button
      const catTr = el('tr', {cls:'cat-row'});
      const catTd = document.createElement('td');
      catTd.setAttribute('colspan', colCount);
      catTd.style.cssText = 'padding:0;width:100%;';
      const togBtn = el('button', {cls:'cat-toggle' + (isOpen ? ' open' : '')});
      togBtn.appendChild(document.createTextNode(cat));

      // Show alert count in category header if any items below minimum
      const alertCount = !useMin ? 0 : catItems.filter(i => {
        const qty = stockObj[i.id]||0; const min = minimums[i.id]||0;
        return min>0 && qty<min;
      }).length;
      const catLocked = lockByWindow && !categoriaLiberada(cat);
      const countText = catLocked
        ? `\uD83D\uDD12 Contagem ${proximaJanela(cat)}`
        : (alertCount > 0
          ? `${catItems.length} itens \u00B7 \u26A0\uFE0F ${alertCount}`
          : `${catItems.length} itens`);
      const countSpan = el('span', {cls:'cat-count', style: catLocked ? 'color:var(--text-3)' : (alertCount>0?'color:var(--warning);font-weight:700':'')}, countText);
      const chevron = el('span', {cls:'cat-chevron'}, '\u25BC');
      togBtn.appendChild(countSpan);
      togBtn.appendChild(chevron);
      togBtn.addEventListener('click', () => {
        openCats[cat] = !openCats[cat];
        togBtn.classList.toggle('open', openCats[cat]);
        const rows = tbody.querySelectorAll(`[data-cat="${CSS.escape(cat)}"]`);
        rows.forEach(r => { r.style.display = openCats[cat] ? '' : 'none'; });
      });
      if (pdfLabel) {
        // Bot\u00E3o de PDF da categoria, ao lado do toggle
        const catWrap = el('div', {style:'display:flex;align-items:stretch;gap:6px;width:100%'});
        togBtn.style.flex = '1';
        const catPdfBtn = el('button', {
          cls:'btn btn-outline btn-sm',
          style:'flex:0 0 auto;align-self:center;padding:4px 10px;font-size:11px;white-space:nowrap',
          title:'Gerar PDF apenas desta categoria'
        });
        catPdfBtn.innerHTML = '\uD83D\uDCC4';
        catPdfBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          printStockPdf(pdfLabel, stockObj, cat);
        });
        catWrap.appendChild(togBtn);
        catWrap.appendChild(catPdfBtn);
        catTd.appendChild(catWrap);
      } else {
        catTd.appendChild(togBtn);
      }
      catTr.appendChild(catTd);
      tbody.appendChild(catTr);

      catItems.forEach(item => {
        const qty = stockObj[item.id] || 0;
        const min = useMin ? (minimums[item.id] || 0) : 0;
        const isZero = qty === 0;
        const isLow  = min > 0 && qty < min && !isZero;
        const isOk   = !isZero && !isLow;

        const tr = el('tr', {});
        tr.setAttribute('data-cat', cat);
        if (!isOpen) tr.style.display = 'none';
        // highlight: alertas de cor apenas quando m\u00EDnimos est\u00E3o ativos (CPD)
        if (useMin && isZero) tr.style.background = 'var(--danger-bg)';
        else if (useMin && isLow) tr.style.background = 'var(--warning-bg)';

        const nameTd = el('td', {cls:'item-name'});
        nameTd.textContent = item.name;
        nameTd.style.fontWeight = qty>0?'500':'400';
        const dotColor = isZero ? 'var(--danger)' : isLow ? '#E8A020' : '';
        const inlineText = item.unit + (min>0 ? ` \u00B7 m\u00EDn: ${min}` : '');
        const inlineUnit = el('span', {cls:'item-unit-inline', style: dotColor?`color:${dotColor};font-weight:600`:''}, inlineText);
        nameTd.appendChild(inlineUnit);
        tr.appendChild(nameTd);

        if (editable) {
          // Medida (read-only in CPD panel \u2014 edit in Cat\u00E1logo)
          tr.appendChild(el('td', {cls:'muted col-unit'}, item.unit));

          // M\u00EDnimo cell (read-only in CPD panel -- edit in Cat\u00E1logo)
          if (showMin) {
            const minTd = el('td', {cls:'col-min', style:'text-align:right;padding-right:10px'});
            const curMin = minimums[item.id] || 0;
            minTd.appendChild(el('span', {style:'font-size:12px;color:var(--text-3)'}, curMin > 0 ? String(curMin) : '\u2014'));
            tr.appendChild(minTd);
          }

          const ctrlTd = el('td', {cls:'qty-controls-cell', style:'text-align:right; padding: 6px 16px;'});
          const wrap2 = el('div', {cls:'qty-controls'});
          const rowLocked = lockByWindow && !categoriaLiberada(item.category);
          if (rowLocked) wrap2.style.opacity = '0.45';
          const minBtn = el('button', {cls:'qty-btn-sm'}, '-');
          if (rowLocked) minBtn.disabled = true;

          // Colour input based on stock status
          let inpCls = 'qty-inp-sm';
          if (qty > 0 && isOk) inpCls += ' has-val';
          else if (isLow) inpCls += ' has-val'; // will show orange via row bg
          else if (isZero && min > 0) inpCls += ' has-error';
          else if (qty > 0) inpCls += ' has-val';

          const inp = el('input', {
            type: 'text', inputmode: 'decimal', pattern: '[0-9]*',
            cls: inpCls, value: String(qty)
          });
          if (rowLocked) { inp.disabled = true; inp.title = 'Contagem dispon\u00EDvel ' + proximaJanela(item.category); }
          const plusBtn = el('button', {cls:'qty-btn-sm'}, '+');
          if (rowLocked) plusBtn.disabled = true;
          minBtn.addEventListener('click', () => {
            const cur = parseFloat(inp.value.replace(',', '.')) || 0;
            updateQty(item.id, cur - 1, inp, tr, inlineUnit);
          });
          plusBtn.addEventListener('click', () => {
            const cur = parseFloat(inp.value.replace(',', '.')) || 0;
            updateQty(item.id, cur + 1, inp, tr, inlineUnit);
          });
          inp.addEventListener('change', () => { updateQty(item.id, inp.value, inp, tr, inlineUnit); });
          inp.addEventListener('blur',   () => { updateQty(item.id, inp.value, inp, tr, inlineUnit); });
          wrap2.appendChild(minBtn); wrap2.appendChild(inp); wrap2.appendChild(plusBtn);
          ctrlTd.appendChild(wrap2);
          tr.appendChild(ctrlTd);
        } else {
          // Read-only: show qty with status colour + min as small text
          const qtyColor = isZero ? 'var(--danger)' : isLow ? '#E8A020' : 'var(--success)';
          const qtyTd = el('td', {style:`text-align:right;font-weight:700;color:${qtyColor}`});
          qtyTd.textContent = String(qty);
          if (min > 0) {
            const minLabel = el('div', {style:'font-size:10px;color:var(--text-3);font-weight:400'}, `m\u00EDn: ${min}`);
            qtyTd.appendChild(minLabel);
          }
          tr.appendChild(qtyTd);
          tr.appendChild(el('td', {cls:'muted col-unit'}, item.unit));
          tr.appendChild(el('td', {}));
        }
        tbody.appendChild(tr);
      });
    });
  }

  renderRows('');
  searchInp.addEventListener('input', e => renderRows(e.target.value));
  return wrap;
}

// BATCHMOVEMENTHELPERS

function groupMovementsByBatch(movs) {
  // Group by batchId; solo movements (no batchId) get their own group keyed by id
  const grouped = new Map();
  movs.forEach(m => {
    const key = m.batchId || String(m.id);
    if (!grouped.has(key)) grouped.set(key, []);
    grouped.get(key).push(m);
  });
  // Return array of batch groups sorted by most recent first
  return Array.from(grouped.values()).sort((a, b) =>
    new Date(b[0].date) - new Date(a[0].date)
  );
}

function buildBatchMovList(movs, limit) {
  const wrap = el('div', {});
  const batches = groupMovementsByBatch(movs).slice(0, limit || 15);

  if (!batches.length) {
    wrap.appendChild(el('div', {cls:'empty'}, 'Nenhuma movimenta\u00E7\u00E3o registrada.'));
    return wrap;
  }

  batches.forEach(batch => {
    const first   = batch[0];
    const type    = first.type;
    const dest    = first.unitName || '';
    const date    = new Date(first.date);
    const count   = batch.length;

    const timeStr = date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    const dateStr = date.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'2-digit'});

    const row = el('div', {cls:'batch-mov-row', onclick: () => openBatchModal(batch)});

    // Badge
    const badge = el('span', {cls:'badge ' + type}, type === 'entrada' ? 'Entrada' : 'Sa\u00EDda');

    // Info
    const info = el('div', {cls:'batch-mov-info'});
    const title = el('div', {cls:'batch-mov-title'});
    title.appendChild(badge);
    title.appendChild(document.createTextNode(
      `${count} ${count === 1 ? 'produto' : 'produtos'}${dest ? ' \u2192 ' + dest : ''}`
    ));
    info.appendChild(title);

    // Sub: first 2 item names + "e mais X"
    const preview = batch.slice(0, 2).map(m => {
      const item = catalog.find(i => i.id === m.itemId);
      return item ? item.name : '\u2014';
    });
    let subText = preview.join(', ');
    if (batch.length > 2) subText += ` e mais ${batch.length - 2}`;
    const sub = el('div', {cls:'batch-mov-sub'}, `${dateStr} \u0060s ${timeStr}  \u00B7  ${subText}`);
    info.appendChild(sub);

    // Arrow
    const arrow = el('span', {cls:'batch-mov-arrow'}, '\u203A');

    row.append(info, arrow);
    wrap.appendChild(row);
  });

  return wrap;
}
